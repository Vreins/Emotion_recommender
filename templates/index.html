<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emotion Capture</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        video, canvas {
            width: 420px;
            height: 315px;
            border-radius: 12px;
            border: 2px solid #38bdf8;
            margin-top: 20px;
        }
        #video, #canvas {
            display: block;
            margin: 20px auto;
        }

        button {
            margin: 10px;
            padding: 12px 18px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 15px;
        }

        .start { background: #22c55e; }
        .stop  { background: #ef4444; }

        /* 🔥 Recommendation Grid */
        #recommendations {
            margin-top: 40px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            max-height: 500px;
            overflow-y: auto;
            padding: 10px;
        }

        /* Individual card */
        .card {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        .card a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: bold;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            #recommendations {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            #recommendations {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            #recommendations {
                grid-template-columns: 1fr;
            }
        }
</style>
</head>

<body>

<h2>🎥 Emotion Capture</h2>

<video id="video" autoplay muted playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<div>
    <button class="start" onclick="startCamera()">Start Camera</button>
</div>

<p id="status"></p>
<h3 id="emotion"></h3>
<div id="recommendationOptions" style="display:none; margin-top:20px;">
    <p>Select recommendation type:</p>

    <label>
        <input type="radio" name="recommendType" value="album">
        By Album
    </label>

    <label style="margin-left:20px;">
        <input type="radio" name="recommendType" value="song">
        By Song
    </label>
</div>
<div id="recommendations" style="margin-top:30px;"></div>


<script>
let detectedMood = null;
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let stream = null;
let captureTimeout = null;

// --------------------
// Start camera
// --------------------
async function startCamera() {
    resetView();

    document.getElementById("emotion").innerText = "";
    document.getElementById("status").innerText = "📸 Camera started...";

    try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        await video.play();

        captureTimeout = setTimeout(captureFrame, 5000);
    } catch (err) {
        document.getElementById("status").innerText = "❌ Camera access denied";
        console.error(err);
    }
}

// --------------------
// Capture frame
// --------------------
function captureFrame() {
    if (!stream) return;

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    stopCamera();

    video.style.display = "none";
    canvas.style.display = "block";

    document.getElementById("status").innerText = "🧠 Analysing emotion...";

    canvas.toBlob(sendToServer, "image/jpeg");
}

// --------------------
// Stop camera
// --------------------
function stopCamera() {
    if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
    }
    clearTimeout(captureTimeout);
}

// --------------------
// Reset UI for restart
// --------------------
function resetView() {
    stopCamera();

    canvas.style.display = "none";
    video.style.display = "block";

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    video.srcObject = null;
}

// --------------------
// Send to FastAPI
// --------------------
async function sendToServer(blob) {
    let formData = new FormData();
    formData.append("image", blob, "face.jpg");

    try {
        const res = await fetch("http://localhost:8000/emotion/camera", {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        if (data.emotion) {
            detectedMood = data.emotion;
            document.getElementById("emotion").innerText =
                `Emotion: ${data.emotion}`;
            document.getElementById("recommendationOptions").style.display = "block";
        } else {
            document.getElementById("emotion").innerText = "❌ No face detected";
        }

    } catch (err) {
        document.getElementById("emotion").innerText = "❌ Server error";
        console.error(err);
    }
}
document.querySelectorAll('input[name="recommendType"]').forEach(radio => {
    radio.addEventListener("change", async function () {

        if (!detectedMood) return;

        const type = this.value;

        document.getElementById("recommendations").innerHTML =
            "🎵 Loading recommendations...";

        try {
            const res = await fetch(
                `http://localhost:8000/recommend/${detectedMood}/${type}`
            );

            const data = await res.json();

            displayResults(data.results, type);

        } catch (err) {
            document.getElementById("recommendations").innerHTML =
                "❌ Failed to load recommendations";
        }
    });
});

function displayResults(results, type) {

    let container = document.getElementById("recommendations");
    container.innerHTML = "";

    if (!results || !results.length) {
        container.innerHTML = "No results found.";
        return;
    }

    results.forEach(item => {

        let image =
            type === "album"
                ? item.image_url
                : item.album_image_url;

        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <img src="${image}" alt="cover">

            <h4>${item.name}</h4>

            <p>${item.artist}</p>

            <a href="${item.spotify_url}" target="_blank">
                Open in Spotify
            </a>

            ${item.preview_url ? `
                <audio controls style="width:100%; margin-top:10px;">
                    <source src="${item.preview_url}" type="audio/mpeg">
                </audio>
            ` : ""}
        `;

        container.appendChild(div);
    });
}

</script>


</body>
</html>
